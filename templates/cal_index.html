<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Flask Calculator</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
        <h1><center>Simple Calculator</center></h1>
        <div class="container">

         <center><form method="POST">
           <div class="form-group">
                <label for="a">First Number:</label>
                <input type="number" step="any" name="a" id="a" required>
            </div>

            <div class="form-group">
                <label for="b">Second Number:</label>
                <input type="number" step="any" name="b" id="b" required>
            </div>

            <div class="form-group">
                <label for="op">Operation:</label>
                <select name="op" id="op" required>
                    <option value="+">Addition (+)</option>
                    <option value="-">Subtraction (-)</option>
                    <option value="*">Multiplication (*)</option>
                    <option value="/">Division (/)</option>
                </select>
            </div>

            <button type="submit">Calculate</button>
                <p><a href="{{ url_for('history') }}">View  History</a></p>

        </form></center>

        {% if result is not none %}
        <div class="result">
            <h2>Result: {{ result }}</h2>
        </div>
        {% endif %}
    </div>
        

</body>
</html>
